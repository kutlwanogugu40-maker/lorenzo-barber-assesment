<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Now | Lorenzo's Barber Shop</title>
    <link rel="stylesheet" href="styles.css">
    <script src="book-now.js"></script>
    <meta name="description" content="Professional barber services in Soweto including haircuts, beard trimming and grooming.">

<meta name="keywords" content="barber shop, haircuts, beard trim, grooming, Soweto">

<meta name="author" content="Student Name">
</head>
<body>

    <div class="container">
        <h1>Book Your Appointment</h1>
        <form action="confirmation.html" method="get" class="booking-form">
            
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="date">Preferred Date:</label>
            <input type="date" id="date" name="date" required>

            <label for="time">Preferred Time:</label>
            <input type="time" id="time" name="time" min="09:00" max="18:00" required>

            <button type="submit" class="levitate-btn">CONFIRM BOOKING</button>
        </form>
    </div>

</body>
</body>
</html>
